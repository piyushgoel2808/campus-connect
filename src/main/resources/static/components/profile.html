<div class="card p-4 shadow-sm border-0">
    <div class="d-flex justify-content-between mb-4">
        <h4>Edit Profile</h4>
        <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
    </div>
    <div class="row g-3">
        <div class="col-12"><label class="small text-muted">Headline</label><input type="text" id="pHeadline" class="form-control"></div>
        <div class="col-6"><label class="small text-muted">Current Company</label><input type="text" id="pCompany" class="form-control"></div>
        <div class="col-6"><label class="small text-muted">Designation</label><input type="text" id="pDesignation" class="form-control"></div>
        <div class="col-12"><label class="small text-muted">Skills</label><input type="text" id="pSkills" class="form-control"></div>
        <div class="col-12"><label class="small text-muted">Experience</label><textarea id="pExperience" class="form-control" rows="3"></textarea></div>
        <div class="col-6"><label class="small text-muted">LinkedIn</label><input type="text" id="pLinkedin" class="form-control"></div>
        <div class="col-6"><label class="small text-muted">GitHub</label><input type="text" id="pGithub" class="form-control"></div>
    </div>
</div>
