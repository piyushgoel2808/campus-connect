<div class="card border-0 shadow-sm p-3">
    <div class="row g-2 mb-3">
        <div class="col-md-5">
            <input type="text" id="dirSearch" class="form-control" placeholder="🔍 Search name, skill..." onkeyup="debouncedSearch()">
        </div>
        <div class="col-md-3">
            <select id="filterRole" class="form-select" onchange="runSearch()">
                <option value="ALL">All Roles</option>
                <option value="STUDENT">Students</option>
                <option value="ALUMNI">Alumni</option>
            </select>
        </div>
        <div class="col-md-2">
            <select id="filterBatch" class="form-select" onchange="runSearch()">
                <option value="">Year</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
                <option value="2021">2021</option>
                <option value="2020">2020</option>
            </select>
        </div>
        <div class="col-md-2"><button class="btn btn-primary w-100" onclick="runSearch()">Go</button></div>
    </div>
    <div class="table-responsive">
        <table class="table align-middle table-hover"><tbody id="tableBody"></tbody></table>
    </div>
</div>
