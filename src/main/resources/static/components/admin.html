<div class="content-card p-4">
    <h4 class="mb-4">Admin Dashboard</h4>
    
    <ul class="nav nav-tabs mb-3" id="adminTabs">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-users">Manage Users</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-feedback">User Feedback</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-broadcast">Broadcast</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-users">
            <button class="btn btn-sm btn-success mb-2 float-end" data-bs-toggle="modal" data-bs-target="#addUserModal"><i class="fas fa-plus"></i> Add User</button>
            <div class="table-responsive">
                <table class="table table-sm align-middle"><tbody id="adminUserTable"></tbody></table>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-feedback">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light"><tr><th>User</th><th>Rating</th><th>Comment</th><th>Date</th></tr></thead>
                    <tbody id="adminFeedbackTable"><tr><td colspan="4">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-broadcast">
            <input type="text" id="broadcastSubject" class="form-control mb-2" placeholder="Subject">
            <textarea id="broadcastBody" class="form-control mb-2" rows="3" placeholder="Message"></textarea>
            <button class="btn btn-dark w-100" onclick="sendBroadcast()">Send</button>
        </div>
    </div>
</div>
