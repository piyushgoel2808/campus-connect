<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campus Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; display: flex; align-items: center; height: 100vh; }
        .login-card { max-width: 400px; width: 100%; margin: auto; padding: 30px; border-radius: 15px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .brand-header { text-align: center; color: #0d6efd; margin-bottom: 30px; font-weight: bold; }
        .btn-primary { background-color: #0d6efd; border: none; padding: 10px; font-weight: 600; }
        .btn-primary:hover { background-color: #0b5ed7; }
    </style>
</head>
<body>

    <div class="container">
        <div class="login-card">
            <h2 class="brand-header">🎓 Campus Connect</h2>
            
            <div id="alertBox" class="alert alert-danger d-none"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">EMAIL ADDRESS</label>
                    <input type="email" id="email" class="form-control" placeholder="name@bvicam.in" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">PASSWORD</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill mt-2">Sign In</button>
            </form>
            
            <div class="text-center mt-4">
                <a href="index.html" class="text-decoration-none text-muted small">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
