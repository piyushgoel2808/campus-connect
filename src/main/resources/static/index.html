<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Connect Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; display: flex; align-items: center; height: 100vh; }
        .login-card { max-width: 400px; width: 100%; margin: auto; padding: 20px; border-radius: 10px; background: white; shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .brand-header { text-align: center; color: #0d6efd; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="login-card shadow">
            <h2 class="brand-header">🎓 Campus Connect</h2>
            
            <div id="alertBox" class="alert alert-danger d-none"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="student@bvicam.in" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            
            <div class="text-center mt-3">
                <small>Don't have an account? Ask Admin.</small>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
